<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal - Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            
            <div class="col-lg-2 bg-sidebar p-4 min-vh-100 d-flex flex-column justify-content-between">
                <div>
                    <div class="text-center mb-5 mt-2">
                        <div class="mx-auto">
                            <img src="Image_20260516_152941_323-removebg-preview.png" alt="Academia Advanced Learning Logo" class="img-fluid w-100 h-100 object-fit-contain">
                        </div>
                    </div>
                    <ul class="nav flex-column sidebar-nav text-start gap-2">
                        <li class="nav-item"><a class="nav-link" id="link-dashboard" href="#" onclick="navigateToPage('dashboard.html')">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" id="link-notebooks" href="#" onclick="navigateToPage('notebooks.html')">Virtual Notebooks</a></li>
                        <li class="nav-item"><a class="nav-link" id="link-tasks" href="#" onclick="navigateToPage('tasks.html')">Tasks</a></li>
                        <li class="nav-item"><a class="nav-link" id="link-profile" href="#" onclick="navigateToPage('profile.html')">Profile</a></li>
                        <li class="nav-item mt-4"><a class="nav-link text-muted-logout" href="#" onclick="navigateToPage('index.html')">Logout</a></li>
                    </ul>
                </div>
            </div>

            <div class="col-lg-2 bg-panel-sub p-4 border-end border-light-subtle">
                <h5 class="badge-header">Profile</h5>
                <p class="text-muted small mt-2">Student Information.</p>
            </div>

            <div class="col-lg-8 p-5 bg-white main-content-display position-relative">
                <div class="row align-items-start mt-2">
                    <div class="col-md-4 text-center mb-4">
                        <div class="profile-avatar-frame shadow-sm mx-auto mb-3">
                            <svg width="70" height="70" viewBox="0 0 24 24" fill="#6c757d">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 2 4 2zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"/>
                            </svg>
                        </div>
                        <input type="file" class="form-control form-control-sm max-w-200 mx-auto profile-avatar-input">
                    </div>
                    <div class="col-md-8">
                        <div class="student-info-box p-4 border rounded-4 bg-light-card shadow-sm">
                            <h4 class="fw-bold mb-4 text-dark border-bottom pb-2">Student Information</h4>
                            <div class="mb-3">
                                <span class="text-muted small d-block fw-bold text-uppercase tracking-wider">Student ID</span>
                                <span class="fs-5 text-dark fw-medium">SN123456</span>
                            </div>
                            <div class="mb-3">
                                <span class="text-muted small d-block fw-bold text-uppercase tracking-wider">Contact Number</span>
                                <span class="fs-5 text-dark fw-medium">+639150000001</span>
                            </div>
                            <div class="mb-3">
                                <span class="text-muted small d-block fw-bold text-uppercase tracking-wider">Email Address</span>
                                <span class="fs-5 text-dark fw-medium text-break">delacruz.jr@obmontessori.edu.ph</span>
                            </div>
                            <div class="mb-4">
                                <span class="text-muted small d-block fw-bold text-uppercase tracking-wider">Gender</span>
                                <span class="fs-5 text-dark fw-medium">Male</span>
                            </div>
                            <button class="btn btn-cyan px-4 py-2" onclick="triggerPasswordReset()">Change Password</button>
                        </div>
                    </div>
                </div>

                <div class="mockup-footer-tag internal">Student Name | Grade & Section ©2026</div>
            </div>

        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
