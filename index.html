<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-geometric">

    <div class="container-fluid vh-100 d-flex justify-content-center align-items-center">
        <div class="login-card text-center p-4 shadow">
            
            <div class="mb-3 mx-auto" >
                <img src="Image_20260516_152941_323-removebg-preview.png" alt="Academia Advanced Learning Logo" class="img-fluid w-100 h-100 object-fit-contain">
            </div>
            
            <h1 class="fw-bold mb-4 text-dark">Login</h1>

            <div class="mt-3 text-start position-relative">
                <span class="custom-badge-label">Username</span>
                <input type="text" id="username" class="form-control custom-input" placeholder="Enter here">
            </div>

            <div class="mt-4 text-start position-relative">
                <span class="custom-badge-label">Password</span>
                <input type="password" id="password" class="form-control custom-input" placeholder="********">
            </div>

            <div class="form-check form-switch text-start mt-4">
                <input class="form-check-input custom-switch" type="checkbox" id="stayLogged">
                <label class="form-check-label text-muted small ms-2" for="stayLogged">
                    Stay logged in<br><span class="text-black-50 extra-small">Your session stays active.</span>
                </label>
            </div>

            <div class="mt-4 d-flex justify-content-center gap-2">
                <button class="btn btn-cyan rounded-pill px-4" onclick="handleLogin()">Login</button>
                <button class="btn btn-link text-decoration-none text-dark small" onclick="clearForm()">Cancel</button>
            </div>

            <p id="login-error" class="text-danger small mt-3 fw-bold"></p>
            
            <p class="small mt-4 text-secondary text-decoration-underline cursor-pointer" onclick="revealCredentials()">
                Forgot username / password?
            </p>
        </div>
        
        <div class="mockup-footer-tag">Student Name | Grade & Section ©2026</div>
    </div>

    <script src="main.js"></script>
</body>
</html>
