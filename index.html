<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Q4 SkillsTest1</title>

    <!-- css -->
    <link rel="stylesheet" href="style.css">

    <!-- bootstrap -->
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> 

</head>

<body>


    <!-- LOGIN PAGE -->
    <div class="container-fluid vh-100 d-flex justify-content-center align-items-center" id="loginPage">

        <div class="login-card text-center p-4">

            <!-- logo -->
            <img src="logo.png" alt="logo" class="logo mb-3">

            <h1 class="fw-bold">Login</h1>

            <!-- username -->
            <div class="mt-4">
                <label class="small-title">Username</label>
                <input type="text" id="username" class="form-control">
            </div>

            <!-- password -->
            <div class="mt-3">
                <label class="small-title">Password</label>
                <input type="password" id="password" class="form-control">
            </div>

            <!-- checkbox -->
            <div class="form-check text-start mt-3">

                <input class="form-check-input" type="checkbox">

                <label class="form-check-label small">
                    Stay logged in
                </label>

            </div>

            <!-- buttons -->
            <div class="mt-4">

                <button class="btn btn-info rounded-pill px-4" onclick="login()">
                    Login
                </button>

                <button class="btn btn-light">
                    Cancel
                </button>

            </div>

            <!-- output -->
            <p id="output" class="mt-3"></p>

            <!-- forgot -->
            <p class="small mt-4 text-secondary">
                Forgot username / password
            </p>

        </div>

    </div>


    <script src="main.js"></script>

</body>
</html>
